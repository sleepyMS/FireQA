name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Prisma schema validation
        run: npx prisma validate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # 빌드 시 실제 DB 연결 불필요 — 더미 값으로 타입 체크/번들링만 통과
          DATABASE_URL: "postgresql://user:pass@localhost:5432/fireqa"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/fireqa"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          OPENAI_API_KEY: "sk-placeholder"
          STRIPE_SECRET_KEY: "sk-placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          STRIPE_PRO_MONTHLY_PRICE_ID: "price_placeholder"
          STRIPE_PRO_YEARLY_PRICE_ID: "price_placeholder"
