<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .logo { font-size: 20px; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
    }
    .disconnect-btn {
      font-size: 10px;
      color: #999;
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: pointer;
    }
    .disconnect-btn:hover { color: #e33; border-color: #e33; }

    .section { margin-bottom: 16px; }
    .section label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 12px;
      color: #666;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #0066ff; color: white; }
    .btn-primary:hover { background: #0052cc; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f5f5f5; color: #333; margin-top: 8px; }
    .btn-secondary:hover { background: #eee; }

    .auth-section {
      text-align: center;
      padding: 30px 0;
    }
    .auth-section p { margin-bottom: 16px; color: #666; font-size: 13px; }

    .job-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 6px;
    }
    .job-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.1s;
    }
    .job-item:last-child { border-bottom: none; }
    .job-item:hover { background: #f5f8ff; }
    .job-item.selected { background: #e8f0fe; border-left: 3px solid #0066ff; }
    .job-item .name { font-weight: 500; font-size: 13px; }
    .job-item .meta { font-size: 11px; color: #888; margin-top: 2px; }

    .diagrams-list { margin-top: 12px; }
    .diagram-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f9f9f9;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .diagram-item .info { font-size: 12px; }
    .diagram-item .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #e8f0fe;
      color: #0066ff;
    }

    .message {
      padding: 10px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 12px;
    }
    .message.success { background: #d4edda; color: #155724; }
    .message.error { background: #f8d7da; color: #721c24; }
    .message.info { background: #e8f0fe; color: #004085; }

    .loading { text-align: center; padding: 20px; color: #888; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid #ddd;
      border-top-color: #0066ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">&#x1F525;</span>
      <h1>FireQA</h1>
    </div>
    <div class="user-info" id="userInfo" style="display:none;">
      <span id="userEmail"></span>
      <button class="disconnect-btn" onclick="disconnect()">&#xD7;</button>
    </div>
  </div>

  <!-- 인증 전: 로그인 안내 -->
  <div id="authSection" class="auth-section">
    <p>FireQA 계정을 연결하세요.</p>
    <button class="btn btn-primary" onclick="startAuth()">
      계정 연결하기
    </button>
    <div id="authStatus"></div>
  </div>

  <!-- 인증 후: 작업 목록 -->
  <div id="mainSection" style="display:none;">
    <div class="section">
      <button class="btn btn-secondary" id="loadBtn" onclick="loadJobs()">
        다이어그램 목록 불러오기
      </button>
    </div>

    <div id="jobListSection" style="display:none;">
      <div class="section">
        <label>생성된 다이어그램 선택</label>
        <div class="job-list" id="jobList"></div>
      </div>
    </div>

    <div id="diagramSection" style="display:none;">
      <div class="section">
        <label>다이어그램 목록</label>
        <div class="diagrams-list" id="diagramsList"></div>
      </div>
      <button class="btn btn-primary" id="createBtn" onclick="createAll()" disabled>
        FigJam에 생성하기
      </button>
    </div>
  </div>

  <div id="statusArea"></div>

  <script>
    // 빌드 타임에 주입되는 서버 URL
    var SERVER_URL = '__FIREQA_SERVER_URL__';
    var authToken = null;
    var currentJobs = [];
    var selectedJob = null;
    var selectedDiagrams = [];
    var selectedWireframe = null;
    var pollTimer = null;

    // ─── clientStorage 헬퍼 (main.ts를 통해 중계) ───
    function getStorage(key) {
      return new Promise(function(resolve) {
        var resolved = false;
        var timer = setTimeout(function() {
          if (resolved) return;
          resolved = true;
          window.removeEventListener('message', handler);
          resolve(null);
        }, 3000);
        var handler = function(event) {
          var msg = event.data.pluginMessage;
          if (msg && msg.type === 'storage-result' && msg.key === key) {
            if (resolved) return;
            resolved = true;
            clearTimeout(timer);
            window.removeEventListener('message', handler);
            resolve(msg.value || null);
          }
        };
        window.addEventListener('message', handler);
        parent.postMessage({ pluginMessage: { type: 'get-storage', key: key } }, '*');
      });
    }

    function setStorage(key, value) {
      parent.postMessage({ pluginMessage: { type: 'set-storage', key: key, value: value } }, '*');
    }

    function clearStorage(key) {
      parent.postMessage({ pluginMessage: { type: 'clear-storage', key: key } }, '*');
    }

    // ─── 인증된 fetch 헬퍼 ───
    function authFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      if (authToken) {
        options.headers['Authorization'] = 'Bearer ' + authToken;
      }
      return fetch(url, options).then(function(res) {
        if (res.status === 401) {
          // 토큰 만료 → 재인증
          authToken = null;
          clearStorage('fireqa_token');
          clearStorage('fireqa_email');
          showAuthSection();
          throw new Error('인증이 만료되었습니다. 다시 연결해주세요.');
        }
        return res;
      });
    }

    // ─── 초기화 ───
    async function init() {
      authToken = await getStorage('fireqa_token');
      if (authToken) {
        // 토큰이 유효한지 확인
        try {
          var res = await authFetch(SERVER_URL + '/api/jobs?type=diagrams');
          if (res.ok) {
            var email = await getStorage('fireqa_email');
            showMainSection(email);
            return;
          }
        } catch(e) {}
        // 토큰 무효 → 인증 섹션 표시
        authToken = null;
        clearStorage('fireqa_token');
      }
      showAuthSection();
    }

    function showAuthSection() {
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('mainSection').style.display = 'none';
      document.getElementById('userInfo').style.display = 'none';
    }

    function showMainSection(email) {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('mainSection').style.display = 'block';
      if (email) {
        document.getElementById('userEmail').textContent = email;
        document.getElementById('userInfo').style.display = 'flex';
      }
    }

    // ─── Device Authorization Flow ───
    async function startAuth() {
      var authStatus = document.getElementById('authStatus');
      authStatus.innerHTML = '<div class="loading"><div class="spinner"></div><br>인증 준비 중...</div>';

      try {
        // 1) Device Auth 요청 생성
        var res = await fetch(SERVER_URL + '/api/auth/device', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'create' }),
        });

        if (!res.ok) throw new Error('Device Auth 요청 실패');
        var data = await res.json();
        var deviceCode = data.deviceCode;

        // 2) 브라우저에서 인증 페이지 열기
        parent.postMessage({
          pluginMessage: {
            type: 'open-browser',
            value: SERVER_URL + '/auth/device?code=' + deviceCode,
          }
        }, '*');

        authStatus.innerHTML = '<div class="message info">브라우저에서 로그인 후 승인해주세요.<br><span style="font-size:11px;color:#888;">자동으로 연결됩니다...</span></div>';

        // 3) 폴링 (2초 → 최대 8초로 점진적 증가, 5분 타임아웃)
        var pollInterval = 2000;
        var deadline = Date.now() + 5 * 60 * 1000;

        function pollForToken() {
          if (Date.now() > deadline) {
            authStatus.innerHTML = '<div class="message error">인증 시간이 초과되었습니다. 다시 시도해주세요.</div>';
            return;
          }

          pollTimer = setTimeout(async function() {
            try {
              var pollRes = await fetch(SERVER_URL + '/api/auth/device?code=' + deviceCode);

              if (pollRes.status === 200) {
                var pollData = await pollRes.json();

                if (pollData.token) {
                  authToken = pollData.token;
                  setStorage('fireqa_token', authToken);
                  setStorage('fireqa_email', 'Connected');
                  authStatus.innerHTML = '';
                  showMainSection('Connected');
                  return;
                }
              }
            } catch(e) {}

            pollInterval = Math.min(pollInterval * 1.5, 8000);
            pollForToken();
          }, pollInterval);
        }

        pollForToken();

      } catch(error) {
        authStatus.innerHTML = '<div class="message error">' + error.message + '</div>';
      }
    }

    function disconnect() {
      if (pollTimer) clearTimeout(pollTimer);
      authToken = null;
      clearStorage('fireqa_token');
      clearStorage('fireqa_email');
      currentJobs = [];
      selectedJob = null;
      selectedDiagrams = [];
      selectedWireframe = null;
      document.getElementById('jobListSection').style.display = 'none';
      document.getElementById('diagramSection').style.display = 'none';
      document.getElementById('statusArea').innerHTML = '';
      showAuthSection();
    }

    // ─── 작업 목록 로드 ───
    async function loadJobs() {
      var statusArea = document.getElementById('statusArea');
      statusArea.innerHTML = '<div class="loading"><div class="spinner"></div><br>목록을 불러오는 중...</div>';

      try {
        var [diagRes, wireRes] = await Promise.all([
          authFetch(SERVER_URL + '/api/jobs?type=diagrams'),
          authFetch(SERVER_URL + '/api/jobs?type=wireframes'),
        ]);

        var diagData = diagRes.ok ? await diagRes.json() : { jobs: [] };
        var wireData = wireRes.ok ? await wireRes.json() : { jobs: [] };
        currentJobs = [].concat(diagData.jobs || []).concat(wireData.jobs || []);

        if (currentJobs.length === 0) {
          statusArea.innerHTML = '<div class="message info">완료된 항목이 없습니다. FireQA 웹에서 먼저 생성해주세요.</div>';
          return;
        }

        statusArea.innerHTML = '';
        renderJobList();
      } catch (error) {
        statusArea.innerHTML = '<div class="message error">' + error.message + '</div>';
      }
    }

    function renderJobList() {
      var container = document.getElementById('jobList');
      container.innerHTML = currentJobs.map(function(job, i) {
        var icon = job.type === 'wireframes' ? '&#x1F5BC; ' : '&#x1F4CA; ';
        return '<div class="job-item" data-index="' + i + '" onclick="selectJob(' + i + ')">' +
          '<div class="name">' + icon + job.projectName + '</div>' +
          '<div class="meta">' + job.fileName + ' &middot; ' + new Date(job.createdAt).toLocaleDateString('ko-KR') + '</div>' +
        '</div>';
      }).join('');

      document.getElementById('jobListSection').style.display = 'block';
    }

    async function selectJob(index) {
      var job = currentJobs[index];
      selectedJob = job;

      document.querySelectorAll('.job-item').forEach(function(el, i) {
        el.classList.toggle('selected', i === index);
      });

      var statusArea = document.getElementById('statusArea');
      statusArea.innerHTML = '<div class="loading"><div class="spinner"></div><br>데이터를 불러오는 중...</div>';

      try {
        if (job.type === 'wireframes') {
          var res = await authFetch(SERVER_URL + '/api/wireframes/' + job.id);
          if (!res.ok) throw new Error('데이터 조회 실패: ' + res.status);
          var data = await res.json();
          selectedWireframe = data;
          selectedDiagrams = [];
          statusArea.innerHTML = '';
          renderWireframe();
        } else {
          var diagramRes = await authFetch(SERVER_URL + '/api/diagrams/' + job.id);
          if (!diagramRes.ok) throw new Error('데이터 조회 실패: ' + diagramRes.status);
          var diagramData = await diagramRes.json();
          selectedDiagrams = diagramData.diagrams || [];
          selectedWireframe = null;
          statusArea.innerHTML = '';
          renderDiagrams();
        }
      } catch (error) {
        statusArea.innerHTML = '<div class="message error">' + error.message + '</div>';
      }
    }

    function renderWireframe() {
      var container = document.getElementById('diagramsList');
      var screens = selectedWireframe && selectedWireframe.screens ? selectedWireframe.screens : [];
      var flows = selectedWireframe && selectedWireframe.flows ? selectedWireframe.flows : [];
      container.innerHTML = '<div class="diagram-item"><div class="info">&#x1F4F1; ' + screens.length + '개 화면</div><span class="badge">' + flows.length + '개 흐름</span></div>';
      document.getElementById('diagramSection').style.display = 'block';
      document.getElementById('createBtn').disabled = false;
      document.getElementById('createBtn').textContent = 'Figma에 와이어프레임 생성하기';
    }

    function renderDiagrams() {
      var container = document.getElementById('diagramsList');
      container.innerHTML = selectedDiagrams.map(function(d) {
        var nodeCount = d.nodes ? d.nodes.length : 0;
        return '<div class="diagram-item"><div class="info">' + d.title + '</div><span class="badge">' + nodeCount + '개 노드</span></div>';
      }).join('');

      document.getElementById('diagramSection').style.display = 'block';
      document.getElementById('createBtn').disabled = false;
      document.getElementById('createBtn').textContent = 'FigJam에 생성하기';
    }

    function createAll() {
      if (selectedWireframe) {
        var createBtn = document.getElementById('createBtn');
        createBtn.disabled = true;
        createBtn.textContent = '생성 중...';

        parent.postMessage({
          pluginMessage: { type: 'create-wireframe', wireframeData: selectedWireframe }
        }, '*');

        window.onmessage = function(event) {
          var msg = event.data.pluginMessage;
          if (!msg) return;
          var statusArea = document.getElementById('statusArea');
          if (msg.type === 'success') {
            statusArea.innerHTML = '<div class="message success">' + msg.message + '</div>';
          } else if (msg.type === 'error') {
            statusArea.innerHTML = '<div class="message error">' + msg.message + '</div>';
          }
          createBtn.textContent = 'Figma에 와이어프레임 생성하기';
          createBtn.disabled = false;
        };
        return;
      }

      if (selectedDiagrams.length === 0) return;

      var diagramBtn = document.getElementById('createBtn');
      diagramBtn.disabled = true;
      diagramBtn.textContent = '생성 중...';
      var created = 0;

      function createNext() {
        if (created >= selectedDiagrams.length) {
          diagramBtn.textContent = 'FigJam에 생성하기';
          diagramBtn.disabled = false;
          return;
        }

        parent.postMessage({
          pluginMessage: {
            type: 'create-diagram',
            diagram: selectedDiagrams[created],
            diagramIndex: created,
            totalDiagrams: selectedDiagrams.length,
          }
        }, '*');
        created++;
      }

      window.onmessage = function(event) {
        var msg = event.data.pluginMessage;
        if (!msg) return;
        var statusArea = document.getElementById('statusArea');
        if (msg.type === 'success') {
          statusArea.innerHTML = '<div class="message success">' + msg.message + '</div>';
          setTimeout(createNext, 500);
        } else if (msg.type === 'error') {
          statusArea.innerHTML = '<div class="message error">' + msg.message + '</div>';
          diagramBtn.textContent = 'FigJam에 생성하기';
          diagramBtn.disabled = false;
        }
      };

      createNext();
    }

    window.addEventListener('unload', function() {
      if (pollTimer) clearTimeout(pollTimer);
    });

    init();
  </script>
</body>
</html>
